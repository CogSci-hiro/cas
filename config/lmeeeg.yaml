lmeeeg:
  enabled: true
  backend: "lmeeeg"
  random_effects:
    group: "subject_id"
    structure: "random_intercept"

  selection:
    # Optional shared selection defaults for all models.
    # event_type: "other_spp_onset"
    # Optional second-stage pandas query over epoch metadata after epochs[event_type].
    # metadata_query: "latency > 0 and duration_s >= 0.1"

  models:
    evoked_model:
      modality: "evoked"
      selection:
        event_type: "other_spp_onset"
      formula: "~ spp_class_1 + latency + duration_s + run"
      eligibility:
        not_null:
          - "spp_class_1"
          - "latency"
          - "duration_s"
        min_values:
          duration_s: 0.10
      test_predictors:
        - "spp_class_1"
      standardize:
        - "latency"
        - "duration_s"
    induced_model:
      modality: "induced"
      selection:
        event_type: "self_spp_onset"
      formula: "~ spp_class_1 + latency + duration_s + run"
      eligibility:
        not_null:
          - "spp_class_1"
          - "latency"
          - "duration_s"
        min_values:
          duration_s: 0.10
      test_predictors:
        - "spp_class_1"
      standardize:
        - "latency"
        - "duration_s"
  test:
    method: "tfce"
    n_permutations: 200
    tail: 0
    adjacency: "mne_default"
    montage: "biosemi64"
    cluster_forming_alpha: 0.05
    seed: 0

    # For TFCE, switch method and provide a threshold mapping:
    # method: "tfce"
    tfce_threshold:
       start: 0.0
       step: 0.01

induced_epochs:
  bands: ["theta", "alpha", "beta"]
