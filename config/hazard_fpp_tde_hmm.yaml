mode: "neural_lowlevel"

input:
  tde_hmm_results_dir: "/Users/hiro/Datasets/working/cas/models/glhmm"
  events_table_path: "/Users/hiro/Datasets/working/cas/events/events.csv"
  pairing_issues_table_path: "/Users/hiro/Datasets/working/cas/events/pairing_issues.csv"
  dyads_csv_path: "dyads.csv"

output:
  output_dir: "/Users/hiro/Datasets/working/cas/reports/hazard_fpp_tde_hmm"

neural:
  enabled: true
  event_types: ["fpp", "spp"]
  events_path: "/Users/hiro/Datasets/working/cas/events/events.csv"
  out_dir: "/Users/hiro/Datasets/working/cas/reports/hazard_neural_lowlevel"
  bin_size_s: 0.050
  input:
    surprisal_paths:
      - "/Users/hiro/Datasets/working/cas/features/surprisal/*.tsv"
    lowlevel_neural_paths:
      - "/Users/hiro/Datasets/working/cas/features/neural_lowlevel/*.tsv"
  episode:
    ipu_gap_threshold_s: 0.300
    max_followup_s: 6.0
    include_censored: true
  window:
    start_lag_s: 0.500
    end_lag_s: 0.100
    epsilon: 1.0e-12
  pca:
    mode: "variance"
    n_components: 3
    variance_threshold: 0.90
  model:
    fitting_backend: "glmmTMB"
    include_quadratic_offset_timing: true
    information_rate_lag_ms: 150
    prop_expected_lag_ms: 700

event_definition:
  partner_onset_column: "fpp_onset"
  target_onset_column: "spp_onset"
  target_label_column: "spp_label"
  partner_label_column: "fpp_label"
  fpp_label_prefixes:
    - "FPP_"
  event_id_column: "pair_id"
  recording_id_column: "recording_id"
  run_column: "run"
  partner_speaker_column: "speaker_fpp"
  target_speaker_column: "speaker_spp"
  issue_partner_tier_column: "fpp_tier"
  issue_code_column: "issue_code"
  issue_partner_label_column: "fpp_label"
  issue_partner_onset_column: "fpp_onset"
  issue_partner_offset_column: "fpp_offset"
  censoring_issue_codes:
    - "no_opposite_spp"

time_axis:
  observation_window_seconds: 3.0
  bin_size_seconds: 0.05
  entropy_lag_seconds: 0.15
  exclude_initial_seconds: 0.0

entropy:
  normalize_by_log_k: true
  epsilon: 1.0e-12
  zscore_within_subject: true

model:
  fitting_backend: "auto"
  include_quadratic_time: true
  prefer_random_intercept_subject: true

qc:
  make_entropy_trajectory_plot: true
  make_entropy_histogram: true
  make_predicted_hazard_plot: true
  make_event_rate_by_entropy_quantile_plot: true
  make_observed_hazard_by_time_bin_plot: true
  make_observed_hazard_by_time_bin_smoothed_plot: true
  make_observed_event_rate_by_entropy_quantile_plot: true
  make_observed_hazard_by_time_and_entropy_quantile_plot: true
  make_model_vs_observed_hazard_plot: true
  make_entropy_distribution_terminal_vs_nonterminal_plot: true

plotting:
  entropy_quantile_count: 5
  entropy_group_count_for_time_plot: 3
  min_at_risk_per_bin: 10
  smoothing_window_bins: 3

misc:
  overwrite: true
