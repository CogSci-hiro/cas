analysis_name: "info_rate_induced_lmeeg"

input:
  induced_source_epochs_dir: "induced_source_epochs"
  behaviour_riskset_path: "behavior/hazard/risksets/pooled_fpp_spp.parquet"
  metadata_query: "event_lock == 'onset' and event_role == 'self' and event_family in ['fpp', 'spp']"

output:
  out_dir: "results/info_rate_induced_lmeeg"

windows:
  anchor_window_s:
    start: -1.5
    end: 0.0
  neural_bin_width_s: 0.050
  info_bin_width_s: 0.050
  min_causal_lag_s: 0.050
  max_causal_lag_s: 1.000
  anchor_onset_round_decimals: 3

morlet:
  bands:
    alpha:
      start_hz: 8.0
      end_hz: 12.0
      step_hz: 1.0
    beta:
      start_hz: 13.0
      end_hz: 30.0
      step_hz: 1.0
  n_cycles:
    mode: "frequency_divisor"
    divisor: 2.0
  baseline:
    enabled: false
    interval_s: [-0.5, -0.1]
    mode: "logratio"

controls:
  planned_response_duration: "planned_response_duration"
  planned_response_total_information: "planned_response_total_information"
  time_from_partner_onset: "time_from_partner_onset"
  time_from_partner_offset: "time_from_partner_offset"
  run: "run"
  time_within_run: "time_within_run"

modeling:
  average_channels: true
  min_rows_per_cell: 20
  min_subjects_per_cell: 2
  maxiter: 200

plotting:
  formats: ["png", "pdf"]
  show_uncorrected_p05_contours: true

cluster_correction:
  enabled: false
  cluster_forming_p: 0.05
  n_permutations: 1000

io:
  table_format: "parquet"

verbose: true
progress: true
