# ============================================================
# PREPROCESSING
# ============================================================

preprocessing:
  # Documented pipeline order. Execution is currently hard-coded in
  # src/cas/preprocessing/pipeline.py rather than driven by this list.
  pipeline_order:
    - extract_events
    - split_channels
    - apply_montage
    - load_bad_channels
    - downsample
    - filter
    - apply_ica
    - interpolate_bad_channels
    - rereference

  # Event extraction
  annotation_pairing_margin_s: 1.0

  # Channel grouping
  montage: "standard_1020"
  keep_emg: true
  eeg_channel_names: []
  eeg_channel_patterns: []
  emg_channel_names: []
  emg_channel_patterns:
    - "(?i)^emg\\d*$"
    - "(?i)\\bemg\\b"

  # EEG processing defaults
  target_sampling_rate_hz: 200.0
  low_cut_hz: 0.1
  high_cut_hz: 40.0
  interpolate_bad_channels: true
  apply_rereference: true

  # Apply precomputed ICA only when a matching file exists.
  apply_ica: true
  ica_filename_template: "sub-{subject}_task-{task}_run-{run}_raw_ica.fif"
