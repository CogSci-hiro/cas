# ============================================================
# PREPROCESSING
# ============================================================

preprocessing:
  # Optional target sampling rate in Hz. Set to null to keep the native rate.
  target_sampling_rate_hz: 250.0

  # Broad EEG filtering parameters. Either value can be null for one-sided filtering.
  low_cut_hz: 0.5
  high_cut_hz: 40.0

  # Use bad channels from the matching BIDS channels.tsv and interpolate them.
  interpolate_bad_channels: true

  # Apply average EEG rereferencing once after bad channel interpolation.
  apply_rereference: true

  # Apply precomputed ICA if available in paths.yaml:ica_dir.
  apply_ica: false

  # File naming pattern for saved ICA models inside paths.yaml:ica_dir.
  ica_filename_template: "sub-{subject}_task-{task}_run-{run}_raw_ica.fif"
