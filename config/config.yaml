# Top-level config entrypoint.
# This repo is using plain YAML composition rather than Hydra, so each key
# points to the concrete config file that should be loaded manually.
# Load these files explicitly in code and merge them into one runtime config.
paths: "config/paths.yaml"
dataset: "config/dataset.yaml"
sampling: "config/sampling.yaml"
preprocessing: "config/preprocessing.yaml"
events: "config/events.yaml"
acoustic: "config/features/acoustic.yaml"
epochs: "config/epochs/erp.yaml"
trf: "config/trf/trf_surprisal.yaml"
lmeeeg: "config/induced/alpha_beta_lmeeeg.yaml"
source_localisation: "config/induced/source_localisation.yaml"
trf_spp_onset_control: "config/trf/spp_onset_control.yaml"
info_rate_induced_lmeeg: "config/induced/info_rate_induced_lmeeg.yaml"
