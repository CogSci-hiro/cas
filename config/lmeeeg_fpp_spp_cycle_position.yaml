lmeeeg:
  enabled: true
  backend: "lmeeeg"
  analysis_name: "fpp_spp_cycle_position"
  event_table: "/Users/hiro/Datasets/working/cas/events/events.csv"

  design:
    # First-pass active-sensing cycle-position contrast:
    # FPP = initiation phase, SPP = response/update phase.
    # This contrast is not by itself a pure motor-free belief-state test.
    # TODO: consider pair-level or dyad-level random effects in a later pass.
    column_mapping:
      subject: "subject_id"
      pair_position: "event_family"
      event_duration: "duration_s"
      time_within_run: "event_onset_conversation_s"
    value_mapping:
      pair_position:
        fpp: "FPP"
        spp: "SPP"
    predictors:
      categorical:
        - "pair_position"
        - "run"
      continuous:
        - "event_duration"
        - "latency"
        - "time_within_run"
    zscore:
      event_duration: "z_event_duration"
      latency: "z_latency"
      time_within_run: "z_time_within_run"
    required_columns:
      - "subject"
      - "run"
      - "pair_position"
      - "event_duration"
      - "latency"
      - "time_within_run"
    reference_levels:
      pair_position: "SPP"
    contrast_of_interest: "pair_positionFPP"

  models:
    fpp_vs_spp_cycle_position:
      modality: "induced"
      formula: "power ~ pair_position + z_event_duration + z_latency + run + z_time_within_run + (1 | subject)"
      random_effect_group: "subject"
      selection:
        metadata_query: "event_lock == 'onset' and event_family in ['fpp', 'spp']"
      test_predictors:
        - "pair_position"

  test:
    # Use a lighter correction here so pooled induced inference completes
    # reliably on the local workstation instead of being killed during TFCE.
    method: "maxstat"
    n_permutations: 64
    tail: 0
    adjacency: "mne_default"
    montage: "biosemi64"
    cluster_forming_alpha: 0.05
    seed: 0
    tfce_threshold:
      start: 0.0
      step: 0.01

induced_epochs:
  bands: ["alpha", "beta"]
