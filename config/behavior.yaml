analysis:
  name: final_behavioral_hazard
  description: >
    Final behavioural discrete-time hazard analysis testing whether
    information dynamics during partner FPPs predict response hazard
    above partner-onset and partner-offset timing, with SPP as a
    matched negative-control anchor class.

paths:
  events_csv: /Users/hiro/Datasets/working/cas/events/events.csv
  surprisal_tsv: /Users/hiro/Datasets/hyperscanning-bids/derivatives/converted_lm_features/features/events/**/*desc-lmSurprisal_features.tsv
  out_dir: reports/hazard_behavior_final

riskset:
  bin_size_ms: 50
  include_censored_episodes: true
  drop_bins_after_event: true
  min_episode_duration_ms: 100
  max_episode_duration_ms: null

anchors:
  primary: fpp
  control: spp
  run_primary: true
  run_control: true
  run_pooled_comparison: true

columns:
  outcome: event_bin
  anchor_type: anchor_type

  ids:
    episode: episode_id
    dyad: dyad_id
    subject: subject_id
    run: run_id

  timing:
    partner_onset: partner_onset_s
    partner_offset: partner_offset_s
    bin_start: bin_start_s
    bin_end: bin_end_s
    time_from_partner_onset: time_from_partner_onset_s
    time_from_partner_offset: time_from_partner_offset_s

  information:
    information_rate: information_rate
    prop_expected_cumulative_info: prop_expected_cumulative_info

features:
  timing:
    use_onset_time: true
    use_offset_time: true
    use_offset_time_squared: true
    primary_timing_mode: linear_quadratic

  information:
    use_information_rate: true
    use_prop_expected_cumulative_info: true

  standardization:
    enabled: true
    columns:
      - information_rate
      - prop_expected_cumulative_info
    suffix: _z
    scope: within_anchor
    save_means_sds: true

lags:
  enabled: true
  unit: ms

  selection_anchor: fpp
  apply_selected_lag_to:
    - fpp
    - spp
    - pooled_fpp_spp

  grid_ms:
    - 0
    - 50
    - 100
    - 150
    - 200
    - 250
    - 300
    - 400
    - 500

  selection_model: full_information
  selection_against: timing_only
  selection_criterion: bic

  shared_lag_across_information_predictors: true
  allow_separate_lags_by_predictor: false
  allow_separate_lags_by_anchor: false

  create_lagged_columns: true
  lag_direction: past_predicts_current_hazard

models:
  family: binomial
  link: logit

  sequence:
    - name: timing_only
      formula_terms:
        - z_time_from_partner_onset_s
        - z_time_from_partner_offset_s
        - z_time_from_partner_offset_s_squared

    - name: information_rate
      formula_terms:
        - z_time_from_partner_onset_s
        - z_time_from_partner_offset_s
        - z_time_from_partner_offset_s_squared
        - information_rate_lag_SELECTED_ms_z

    - name: full_information
      formula_terms:
        - z_time_from_partner_onset_s
        - z_time_from_partner_offset_s
        - z_time_from_partner_offset_s_squared
        - information_rate_lag_SELECTED_ms_z
        - prop_expected_cumulative_info_lag_SELECTED_ms_z

    - name: timing_information_rate_interaction
      compare_against: full_information
      formula_terms:
        - z_time_from_partner_onset_s
        - z_time_from_partner_offset_s
        - z_time_from_partner_offset_s_squared
        - information_rate_lag_SELECTED_ms_z
        - prop_expected_cumulative_info_lag_SELECTED_ms_z
        - z_time_from_partner_onset_s:information_rate_lag_SELECTED_ms_z
        - z_time_from_partner_offset_s:information_rate_lag_SELECTED_ms_z

  timing_information_rate_interaction:
    enabled: true
    name: timing_information_rate_interaction
    description: >
      Tests whether the information-rate effect on behavioural hazard
      depends on time from partner onset and/or time from partner offset.
    compare_against: full_information
    interaction_predictor: information_rate_lag_SELECTED_ms_z
    timing_interactions:
      - timing_column: time_from_partner_onset_s
        basis: linear
        with: information_rate_lag_SELECTED_ms_z
      - timing_column: time_from_partner_offset_s
        basis: linear
        with: information_rate_lag_SELECTED_ms_z
    include_prop_expected_cumulative_info: true
    fit_for_anchors:
      - fpp
      - spp
    pooled_anchor_comparison:
      enabled: true
      required: false

  mixed_effects:
    enabled: true
    random_intercepts:
      - dyad_id
      - subject_id
    optional_random_intercepts:
      - episode_id

  pooled_comparison:
    enabled: true
    reference_anchor: spp
    formula: >
      event_bin ~ anchor_type * (
        z_time_from_partner_onset_s +
        z_time_from_partner_offset_s +
        z_time_from_partner_offset_s_squared +
        information_rate_lag_SELECTED_ms_z +
        prop_expected_cumulative_info_lag_SELECTED_ms_z
      ) + (1 | dyad_id) + (1 | subject_id)

outputs:
  write_risksets: true
  write_model_summaries: true
  write_model_comparisons: true
  write_coefficients: true
  write_config_snapshot: true
  write_warnings: true
  write_qc_tables: true
  write_figures: true

figures:
  observed_hazard_by_time: true
  information_effects: true
  fpp_spp_coefficient_comparison: true
  predicted_hazard_curves: true
  lag_qc: true
