# Shared project paths used across the workflow.
# These are logical project roots, not necessarily absolute filesystem paths.

# Repository root. Relative paths below are interpreted from here.
project_root: "."

# Root of the raw BIDS dataset. All primary inputs should be discovered from
# this directory, so this config intentionally assumes a BIDS-only workflow.
bids_root: "/Users/hiro/Datasets/hyperscanning-bids"

# Top-level root for generated analysis outputs.
derivatives_root: "/Users/hiro/Datasets/working/cas"

# Root for subject-level extracted features such as envelopes or onsets.
features_root: "/Users/hiro/Datasets/working/cas/derivatives/features"

# Root for EEG arrays exported from raw BIDS EEG files for downstream models.
eeg_array_root: "/Users/hiro/Datasets/working/cas/derivatives/eeg"

# Root for filtered / preprocessed raw EEG derivatives saved as FIF files.
preprocessed_eeg_root: "/Users/hiro/Datasets/working/cas/derivatives/preprocessed_eeg"

# Root containing precomputed ICA models used during preprocessing.
ica_dir: "/Users/hiro/Datasets/Miscellaneous/hyperscanning-testing/derived/eeg/ica_applied"

# Root for TRF model outputs, organized further by analysis_id.
trf_root: "/Users/hiro/Datasets/working/cas/derivatives/trf"

# Root for human-readable summaries, figures, and reports.
reports_root: "/Users/hiro/Datasets/working/cas/reports"

# Root containing validated TextGrid annotation files used for canonical event extraction.
annotations_dir: "/Users/hiro/Projects/active/cas/data/annotations"
