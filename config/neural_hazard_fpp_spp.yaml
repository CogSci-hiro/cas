input:
  fpp_risk_set_path: "reports/hazard_behavior_final/fpp/riskset.parquet"
  spp_risk_set_path: "reports/hazard_behavior_final/spp_control/riskset.parquet"
  neural_features_path: "features/entropy/tde_hmm_entropy_features.parquet"
  dyads_csv_path: "config/dyads.csv"

output:
  out_dir: "reports/neural_hazard/fpp_spp"

bin_width_s: 0.05

lags:
  grid_ms: [0, 50, 100, 150, 200, 300, 500]

merge:
  nearest_tolerance_s: 0.025

zscore:
  neural_scope: "subject_run"
  timing_scope: "global"

pca:
  input_columns:
    - "signal_variance"
    - "broadband_power"
    - "state_switching_rate"
    - "model_badness"
  n_components: 1
  pc1_warning_threshold: 0.40

lag_selection:
  criterion: "delta_loglik"
  avoid_zero_lag: true

circular_shift_null:
  minimum_shift_duration_s: 1.0
  n_permutations: 100
  seed: 12345
  interaction_test: "one_sided_negative"

plots:
  event_triggered_window_start_s: -1.5
  event_triggered_window_end_s: 0.5

misc:
  overwrite: true
  verbose: true
