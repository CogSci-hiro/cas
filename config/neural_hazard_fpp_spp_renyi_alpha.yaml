paths:
  fpp_risk_set: "reports/hazard_behavior_final/fpp/riskset.parquet"
  spp_risk_set: "reports/hazard_behavior_final/spp_control/riskset.parquet"
  neural_features: "features/entropy/tde_hmm_entropy_features.parquet"
  out_dir: "reports/neural_hazard/fpp_spp_renyi_alpha"

analysis:
  bin_width_s: 0.05
  lag_grid_ms: [0, 50, 100, 150, 200, 250, 300, 400, 500]
  avoid_zero_lag: true
  selected_lag_strategy: "best_delta_loglik"
  timing_zscore_scope: "global"
  feature_zscore_scope: "subject_run"

renyi:
  alpha_grid: [0.05, 0.1, 0.15, 0.2, 0.25, 0.35, 0.5, 0.75, 1.0, 1.25, 1.5, 2.0, 3.0, 4.0]
  alpha_one_tolerance: 1.0e-6
  probability_epsilon: 1.0e-12
  primary_selection_metric: "m2_vs_m1_delta_loglik"
  include_shannon_baseline: true
  edge_warning_enabled: true
  fixed_lag_sensitivity_ms: [50, 200]

pca:
  input_columns: ["signal_variance", "broadband_power", "state_switching_rate", "model_badness"]
  n_components: 1
  minimum_pc1_explained_variance: 0.40

circular_shift:
  enabled: true
  n_permutations: 100
  minimum_shift_s: 5.0
  random_seed: 12345
  run_for_best_alpha_only: true
  run_for_shannon: true
  shift_scope: "subject_run"
  shift_entropy_only: true
  p_value_mode_interaction_beta: "two_sided"

diagnostics:
  enabled: true

motor_proximal_sensitivity:
  enabled: true
  minimum_lag_ms: 150
  run_circular_shift_for_best: false

output:
  save_alpha_feature_tables: false
  save_model_predictions: true
  make_plots: true

plots:
  alpha_axis_scale: "linear"
